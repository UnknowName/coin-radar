# 全局默认配置
defaults:
  proxy: null
  timeout: 30

exchanges:
  - name: binance
    # 未指定 proxy 和 timeout 时，使用 defaults 中的值
    timeout: 30
  - name: okx
    proxy: null  # 显式设置为 null，不使用全局代理
    timeout: 30
  - name: bybit
    proxy: null # 覆盖全局代理，使用独立代理
    timeout: 60  # 覆盖全局超时

monitor:
  weights:
    silent_accumulation: 0.25
    cvd_anomaly: 0.20
    oi_price_stable: 0.20
    whale_divergence: 0.20
    funding_divergence: 0.10
    liquidity_thinning: 0.05
  score_threshold: 60.0
  high_priority_threshold: 80.0
  dedup_minutes: 30
  z_score_threshold: 3.0
  baseline_hours: 12

dingtalk:
  client_id: ""
  client_secret: ""
  robot_code: ""
  open_conversation_id: ""
  at_user_ids: []
  at_all: false

filter:
  cooldown_minutes: 120
  top_n: 10
