# CircleCI configuration - Skip all tests and run directly
version: 2.1
jobs:
  run:
    docker:
      - image: cimg/python:3.14-node
    steps:
      - checkout
      - run:
          name: Run application
          command: |
            echo "Skipping tests, running application directly..."
            uv run python main.py
workflows:
  run-workflow:
    jobs:
      - run
