# CircleCI configuration - Run on non-US region (Asia Pacific)
version: 2.1

executors:
  non-us-executor:
    docker:
      - image: cimg/python:3.14-node
    environment:
      AWS_REGION: ap-southeast-1
      AWS_DEFAULT_REGION: ap-southeast-1

jobs:
  run:
    executor: non-us-executor
    resource_class: small
    steps:
      - checkout
      - run:
          name: Setup environment
          command: |
            echo "Setting up environment for Asia Pacific region..."
            pip install uv
      - run:
          name: Run application
          command: |
            echo "Running on non-US region (Asia Pacific - Singapore)..."
            uv run python main.py

workflows:
  run-workflow:
    jobs:
      - run
